<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agenda Pessoal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ===== RESET & VARS ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0c080e;
  --surface:#1a0e18;
  --surface2:#2d1424;
  --surface3:#3a1c2e;
  --border:#4a2438;
  --border2:#6a3450;
  --gold:#f59e0b;
  --gold2:#d97706;
  --gold-dim:rgba(245,158,11,0.15);
  --text:#f5edf0;
  --text2:#d4c0ca;
  --text3:#a08898;
  --red:#ef4444;
  --green:#22c55e;
  --blue:#3b82f6;
  --purple:#7a2a4a;
  --orange:#f59e0b;
  --pink:#ec4899;
  --cyan:#06b6d4;
  --sidebar:260px;
  --radius:14px;
  --shadow:0 8px 30px rgba(0,0,0,0.6);
  --shadow-hover:0 8px 40px rgba(122,42,74,0.25);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
::-webkit-scrollbar-track{background:var(--surface2);}

/* ===== SIDEBAR ===== */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);height:100vh;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;z-index:10;
  transition:transform .3s ease;
}
.sidebar-logo{
  padding:24px 20px 16px;
  border-bottom:1px solid var(--border);
}
.sidebar-logo .logo-title{
  font-size:1.4rem;font-weight:700;
  background:linear-gradient(135deg,var(--purple),var(--blue),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-.02em;
}
.sidebar-logo .logo-sub{font-size:.72rem;color:var(--text3);margin-top:2px;letter-spacing:.08em;text-transform:uppercase;}
.sidebar-date{
  padding:12px 20px;font-family:'JetBrains Mono',monospace;
  font-size:.7rem;color:var(--text3);letter-spacing:.05em;
  border-bottom:1px solid var(--border);
}
.sidebar-date span{color:var(--orange);font-weight:600;}
nav{flex:1;overflow-y:auto;padding:10px 0;}
.nav-section{padding:12px 20px 4px;font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.14em;font-weight:600;}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 20px;
  cursor:pointer;border-radius:0;color:var(--text2);
  font-size:.85rem;font-weight:500;
  transition:.2s;position:relative;
  user-select:none;
}
.nav-item:hover{background:var(--gold-dim);color:var(--text);}
.nav-item.active{
  background:var(--gold-dim);
  color:var(--orange);
}
.nav-item.active::before{
  content:"";position:absolute;left:0;top:4px;bottom:4px;width:4px;
  background:linear-gradient(180deg,var(--orange),var(--purple));
  border-radius:0 4px 4px 0;
}
.nav-icon{font-size:1.1rem;width:22px;text-align:center;flex-shrink:0;}
.nav-badge{
  margin-left:auto;background:var(--blue);color:#fff;
  font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:20px;
}
.nav-badge.gold{background:var(--orange);color:#0c080e;}

/* sidebar bottom */
.sidebar-bottom{
  padding:14px 20px;border-top:1px solid var(--border);
  font-size:.72rem;color:var(--text3);
}
.weather-mini{display:flex;align-items:center;gap:8px;}
.weather-mini .wm-temp{font-size:1.1rem;font-weight:600;color:var(--orange);}
.weather-mini .wm-desc{font-size:.7rem;color:var(--text2);}

/* ===== MAIN ===== */
.main{flex:1;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.topbar{
  height:56px;min-height:56px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:16px;
}
.topbar-title{font-size:1rem;font-weight:600;flex:1;color:var(--text);}
.topbar-clock{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:500;color:var(--blue);}
.menu-btn{display:none;background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;}
.content{flex:1;overflow-y:auto;padding:24px;}

/* ===== CARDS ===== */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  transition:.25s;
}
.card:hover{box-shadow:var(--shadow-hover);}
.card-title{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--text3);font-weight:600;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.card-title::before{content:attr(data-icon);font-size:1rem;}

/* ===== DASHBOARD ===== */
.dashboard-grid{
  display:grid;
  grid-template-columns:280px 1fr 1fr;
  grid-template-rows:auto auto;
  gap:14px;
  align-items:start;
}
.dash-clock-card{ grid-column:1; grid-row:1/3; }
.dash-tasks-card{ grid-column:2/4; grid-row:1; }
.dash-habits-card{ grid-column:2; grid-row:2; }
.dash-reminders-card{ grid-column:3; grid-row:2; }

/* PAINEL HOJE (coluna esquerda) */
.today-panel-header{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
  padding-bottom:12px;border-bottom:1px solid var(--border);
}
.today-panel-header .today-x{
  width:32px;height:32px;background:var(--orange);
  color:#0c080e;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:1rem;flex-shrink:0;
}
.today-panel-header h2{font-size:1.1rem;font-weight:700;}
.today-stat-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--border);
}
.today-stat-row:last-child{border-bottom:none;}
.today-stat-bar{
  width:24px;height:10px;border-radius:3px;background:var(--green);flex-shrink:0;
}
.today-stat-bar.gold{background:var(--gold);}
.today-stat-bar.red{background:var(--red);}
.today-stat-bar.blue{background:var(--blue);}
.today-stat-label{flex:1;font-size:.82rem;color:var(--text2);}
.today-stat-value{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;color:var(--text);}
.today-sla-row{
  margin-top:14px;padding:10px 14px;
  background:var(--gold-dim);border:1px solid var(--orange);border-radius:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.today-sla-row .sla-label{font-size:.72rem;color:var(--orange);font-weight:700;text-transform:uppercase;letter-spacing:.1em;}
.today-sla-row .sla-value{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--orange);}

/* CLOCK + WEATHER no topo da today panel */
.today-clock-block{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
  padding-bottom:14px;border-bottom:1px solid var(--border);
}
.today-clock-block .mini-clock-face{
  width:56px;height:56px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--border);
  background:var(--surface2);
  position:relative;
}
.today-clock-block .mini-clock-face .hand{position:absolute;left:50%;bottom:50%;transform-origin:bottom center;border-radius:4px;}
.today-clock-block .mini-clock-face .clock-center{position:absolute;left:50%;top:50%;width:5px;height:5px;background:var(--orange);border-radius:50%;transform:translate(-50%,-50%);z-index:2;}
.mini-time{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--text);line-height:1;}
.mini-date{font-size:.7rem;color:var(--text3);margin-top:3px;}

/* TABELA DE TAREFAS (painel central) */
.op-table{width:100%;border-collapse:collapse;}
.op-table th{
  text-align:left;font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--text3);font-weight:700;padding:6px 12px;
  border-bottom:1px solid var(--border2);
}
.op-table td{padding:9px 12px;font-size:.82rem;border-bottom:1px solid var(--border);}
.op-table tr:last-child td{border-bottom:none;}
.op-table tr:hover td{background:var(--surface2);}
.op-sla-dot{
  display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.op-sla-dot.green{background:var(--green);}
.op-sla-dot.red{background:var(--red);}
.op-row-name{display:flex;align-items:center;gap:8px;}

/* HÁBITOS CHART */
.habits-chart-wrap{display:flex;flex-direction:column;gap:8px;}
.habit-chart-row{display:flex;align-items:center;gap:8px;}
.habit-chart-name{font-size:.78rem;color:var(--text2);width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.habit-chart-dots{display:flex;gap:3px;}
.habit-chart-dot{
  width:22px;height:22px;border-radius:5px;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:.55rem;
  font-weight:700;color:var(--text3);cursor:pointer;transition:.12s;
}
.habit-chart-dot.done{background:var(--orange);border-color:var(--orange);color:#0c080e;}
.habit-chart-dot.today{border-color:var(--orange);color:var(--orange);}
.habit-chart-streak{font-size:.68rem;color:var(--orange);font-weight:600;white-space:nowrap;}

/* BAR CHART */
.bar-chart-wrap{display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:8px;}
.bar-chart-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
.bar-chart-col .bar{border-radius:3px 3px 0 0;width:100%;transition:.3s;}
.bar-chart-col .bar.done{background:var(--green);}
.bar-chart-col .bar.pend{background:var(--red);opacity:.7;}
.bar-chart-col .lbl{font-size:.55rem;color:var(--text3);font-family:'JetBrains Mono',monospace;}

/* POMODORO */
.pomodoro-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:10px 0;}
.pomo-ring{position:relative;width:180px;height:180px;}
.pomo-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.pomo-ring-track{stroke:var(--border2);fill:none;stroke-width:8;}
.pomo-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s linear,stroke .3s;}
.pomo-ring-inner{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.pomo-time{font-family:'JetBrains Mono',monospace;font-size:2.6rem;font-weight:700;color:var(--text);line-height:1;}
.pomo-mode-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-top:4px;}
.pomo-controls{display:flex;gap:10px;}
.pomo-btn{
  background:var(--surface2);border:1px solid var(--border2);color:var(--text);
  border-radius:10px;padding:10px 22px;font-size:.88rem;font-weight:600;
  cursor:pointer;font-family:inherit;transition:.2s;
}
.pomo-btn:hover{border-color:var(--orange);color:var(--orange);}
.pomo-btn.primary{background:var(--orange);color:#0c080e;border-color:var(--orange);}
.pomo-btn.primary:hover{background:var(--gold2);}
.pomo-modes{display:flex;gap:6px;}
.pomo-mode-btn{
  background:none;border:1px solid var(--border2);color:var(--text3);
  border-radius:20px;padding:4px 14px;font-size:.75rem;cursor:pointer;
  font-family:inherit;transition:.2s;
}
.pomo-mode-btn.active{border-color:var(--orange);color:var(--orange);background:var(--gold-dim);}
.pomo-sessions{display:flex;gap:6px;align-items:center;}
.pomo-dot{width:10px;height:10px;border-radius:50%;background:var(--border2);border:1px solid var(--border);}
.pomo-dot.done{background:var(--orange);border-color:var(--orange);}
.pomo-info{font-size:.75rem;color:var(--text3);text-align:center;}
.clock-pomo-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:760px;margin:0 auto;}
.clock-pomo-grid .full-clock-card{display:flex;flex-direction:column;align-items:center;gap:16px;padding-top:8px;}

/* CLOCK */
.clock-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.clock-face{
  width:130px;height:130px;border-radius:50%;flex-shrink:0;
  border:3px solid var(--border);
  background:var(--surface2);
  position:relative;
}
.tick{position:absolute;width:1.5px;background:var(--text3);left:50%;transform-origin:1px 62px;}
.tick.major{background:var(--text2);width:2px;}
.hand{position:absolute;left:50%;bottom:50%;transform-origin:bottom center;border-radius:4px;}
.hand.hour{width:4px;height:34px;margin-left:-2px;background:var(--text);}
.hand.minute{width:3px;height:48px;margin-left:-1.5px;background:var(--text2);}
.hand.second{width:1.5px;height:52px;margin-left:-.75px;background:var(--orange);}
.clock-center{position:absolute;left:50%;top:50%;width:8px;height:8px;background:var(--orange);border-radius:50%;transform:translate(-50%,-50%);z-index:2;}
.clock-info{flex:1;}
.big-time{font-family:'JetBrains Mono',monospace;font-size:2.4rem;font-weight:600;color:var(--text);line-height:1;}
.big-date{font-size:.85rem;color:var(--text2);margin-top:8px;text-transform:capitalize;}
.big-day{font-size:1.1rem;font-weight:600;color:var(--orange);margin-top:4px;text-transform:capitalize;}

/* WEATHER */
.weather-big{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px;}
.w-icon{font-size:2.8rem;margin-bottom:6px;}
.w-temp{font-size:2rem;font-weight:700;color:var(--orange);}
.w-desc{font-size:.85rem;color:var(--text2);text-transform:capitalize;margin-top:4px;}
.w-city{font-size:.72rem;color:var(--text3);margin-top:8px;letter-spacing:.06em;}
.w-details{display:flex;gap:16px;margin-top:12px;font-size:.75rem;color:var(--text3);}
.w-details span b{color:var(--text2);}
.w-loading{color:var(--text3);font-size:.85rem;text-align:center;}
.w-search{display:flex;gap:8px;margin-top:12px;}
.w-search input{
  flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:7px 12px;color:var(--text);font-size:.82rem;font-family:inherit;
}
.w-search input:focus{outline:none;border-color:var(--orange);}

/* ===== INPUTS GLOBAIS ===== */
input,textarea,select{
  font-family:inherit;background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;padding:10px 14px;color:var(--text);font-size:.9rem;
  transition:border-color .15s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--orange);}
textarea{resize:vertical;min-height:80px;line-height:1.5;}

/* ===== BOTÕES ===== */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  font-family:inherit;font-size:.82rem;font-weight:600;
  padding:9px 18px;border-radius:8px;cursor:pointer;border:none;
  transition:.2s;letter-spacing:.02em;
}
.btn-gold{background:var(--orange);color:#0c080e;}
.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange);}
.btn-red{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:var(--red);}
.btn-red:hover{background:rgba(239,68,68,0.2);}
.btn-sm{padding:6px 12px;font-size:.76rem;}
.btn-icon{padding:7px;border-radius:8px;}

/* ===== TAREFAS ===== */
.task-list{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto;}
.task-item{
  display:flex;align-items:center;gap:12px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;
  transition:.2s;
}
.task-item.done{opacity:.45;}
.task-item.done .task-text{text-decoration:line-through;color:var(--text3);}
.task-check{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.7rem;transition:.15s;
}
.task-check.checked{background:var(--green);border-color:var(--green);color:#fff;}
.task-text{flex:1;font-size:.88rem;}
.task-priority{
  font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;
}
.task-priority.alta{background:rgba(239,68,68,0.12);color:var(--red);}
.task-priority.media{background:var(--gold-dim);color:var(--orange);}
.task-priority.baixa{background:rgba(34,197,94,0.12);color:var(--green);}
.task-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;padding:4px;border-radius:6px;}
.task-del:hover{color:var(--red);background:rgba(239,68,68,0.08);}
.task-filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.filter-btn{
  background:none;border:1px solid var(--border2);color:var(--text3);
  border-radius:20px;padding:4px 14px;font-size:.75rem;cursor:pointer;transition:.2s;font-family:inherit;
}
.filter-btn.active{border-color:var(--orange);color:var(--orange);background:var(--gold-dim);}
.task-add-row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;}
.task-add-row input,.task-add-row select{flex:1;min-width:120px;}

/* ===== HÁBITOS ===== */
.habits-grid{display:flex;flex-direction:column;gap:10px;}
.habit-row{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;
}
.habit-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.habit-name{flex:1;font-weight:600;font-size:.88rem;}
.habit-streak{font-size:.72rem;color:var(--orange);font-weight:600;}
.habit-days{display:flex;gap:5px;}
.habit-day{
  width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:.65rem;
  font-weight:700;color:var(--text3);cursor:pointer;transition:.2s;font-family:'JetBrains Mono',monospace;
}
.habit-day.done{background:var(--orange);border-color:var(--orange);color:#0c080e;}
.habit-day.today-marker{border-color:var(--orange);color:var(--orange);}
.habit-add-row{display:flex;gap:8px;margin-top:14px;}
.habit-add-row input{flex:1;}

/* ===== LEMBRETES ===== */
.reminder-list{display:flex;flex-direction:column;gap:8px;max-height:360px;overflow-y:auto;}
.reminder-item{
  display:flex;align-items:center;gap:12px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;
}
.reminder-time{
  font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:600;
  color:var(--orange);min-width:50px;
}
.reminder-text{flex:1;font-size:.88rem;}
.reminder-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;}
.reminder-del:hover{color:var(--red);}
.reminder-add-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.reminder-add-row input{flex:1;min-width:120px;}
.reminder-fired{
  border-color:var(--orange)!important;
  animation:glow-reminder 1s ease infinite alternate;
}
@keyframes glow-reminder{from{box-shadow:0 0 0 rgba(245,158,11,0);}to{box-shadow:0 0 16px rgba(245,158,11,0.3);}}

/* ===== NOTAS E CADERNO - LINHAS DE CADERNO ===== */
.notebook-textarea,
.note-card-preview,
#calNoteTA,
#nText,
textarea {
  background-image: repeating-linear-gradient(
    transparent,
    transparent 27px,
    rgba(255,255,255,0.06) 28px,
    rgba(255,255,255,0.06) 28px
  );
  background-color: #1a0e18;
  background-size: 100% 28px;
  line-height: 28px;
  padding: 8px 12px;
  font-family: 'Caveat', cursive;
  font-size: 1.15rem;
  color: #f5edf0;
  border: 1px solid var(--border2);
}
.note-card-preview {
  background: transparent;
  border: none;
  padding: 0;
  font-family: inherit;
  font-size: .8rem;
  line-height: 1.5;
  color: var(--text2);
}

/* ===== NOTAS ===== */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.note-card{
  background:var(--surface);
  border:1px solid var(--border);border-radius:12px;
  padding:16px;cursor:pointer;transition:.2s;position:relative;
  min-height:120px;
}
.note-card:hover{border-color:var(--orange);box-shadow:var(--shadow-hover);}
.note-card-title{font-weight:600;font-size:.9rem;margin-bottom:8px;color:var(--text);}

.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

  font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:600;

.calc-btn:hover{background:var(--surface3);}

.calc-btn.eq:hover{background:var(--gold2);}
.calc-btn.zero{grid-column:span 2;}
.calc-btn.clear{color:var(--red);}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);

}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:.88rem;}
.empty-icon{font-size:2.5rem;display:block;margin-bottom:10px;}

const KEYS={tasks:'ag_tasks',habits:'ag_habits',notes:'ag_notes',reminders:'ag_rem',contacts:'ag_contacts',calNotes:'ag_cal',notebook:'ag_nb'};
let state={
  tasks:   JSON.parse(localStorage.getItem(KEYS.tasks)  ||'[]'),
  habits:  JSON.parse(localStorage.getItem(KEYS.habits) ||'[]'),
  notes:   JSON.parse(localStorage.getItem(KEYS.notes)  ||'[]'),

/* ============================================================

============================================================ */
function persist(){
  Object.keys(KEYS).forEach(k=>localStorage.setItem(KEYS[k],JSON.stringify(state[k])));
  updateBadges();
  if(fsReady){
    suppressSnap=true;
    FS_DOC.set(state).catch(e=>{ console.error(e); showToast('⚠️ Falha ao salvar na nuvem'); });
  }
}

   FIREBASE INIT
============================================================ */
let FS_DOC;
function initFirebase(){
  try{
    firebase.initializeApp(FB_CFG);
    const db=firebase.firestore();
    FS_DOC=db.collection('agenda_v2').doc('dados');
    FS_DOC.onSnapshot(doc=>{
      fsReady=true;
      if(suppressSnap){suppressSnap=false;return;}
      if(doc.exists){
        const d=doc.data();
        ['tasks','habits','notes','reminders','contacts','calNotes','notebook'].forEach(k=>{
          if(d[k]!==undefined) state[k]=d[k];
        });
        Object.keys(KEYS).forEach(k=>localStorage.setItem(KEYS[k],JSON.stringify(state[k])));
        renderCurrent();
        updateBadges();
      } else {
        FS_DOC.set(state);
      }
    },err=>{ console.error(err); showToast('⚠️ Sem conexão — dados locais'); });

}

   HELPERS
============================================================ */
const MESES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const DIAS=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
const DOW_ABR=['D','S','T','Q','Q','S','S'];
function uid(){ return Date.now()+Math.random().toString(36).slice(2); }
function fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg,dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),dur);
}
function closeModal(){ const m=document.getElementById('modal'); if(m) m.remove(); }

  const el=document.createElement('div');
  el.className='modal-overlay';el.id='modal';
  el.innerHTML=`<div class="modal">${html}</div>`;
  el.addEventListener('click',e=>{ if(e.target===el) closeModal(); });
  document.body.appendChild(el);
}

/* ============================================================
   TOPBAR / CLOCK
============================================================ */
function startTopClock(){
  function tick(){
    const n=new Date();
    const el=document.getElementById('topbarClock');
    if(el) el.textContent=n.toLocaleTimeString('pt-BR');
    const sd=document.getElementById('sideDate');
    if(sd) sd.textContent=`${n.getDate()} de ${MESES[n.getMonth()]} de ${n.getFullYear()}`;
  }
  tick();
  setInterval(tick,1000);
}

/* ============================================================
   BADGES
============================================================ */
function updateBadges(){
  const pending=state.tasks.filter(t=>!t.done).length;
  const b=document.getElementById('badge-tarefas');
  if(b){ b.style.display=pending?'':'none'; b.textContent=pending; }
  const fired=state.reminders.filter(r=>!r.dismissed && checkReminderFired(r)).length;
  const br=document.getElementById('badge-lembretes');
  if(br){ br.style.display=fired?'':'none'; br.textContent=fired; }
}
function checkReminderFired(r){
  const now=new Date();
  const [h,m]=r.time.split(':').map(Number);
  return now.getHours()===h && now.getMinutes()===m;
}

/* ============================================================
   ROUTER
============================================================ */
const PAGE_TITLES={
  dashboard:'Dashboard',calendario:'Calendário',relogio:'Relógio',
  tarefas:'Tarefas',lembretes:'Lembretes',habitos:'Hábitos',
  notas:'Notas',caderno:'Caderno',contatos:'Contatos',

};
function navigateTo(page){
  currentPage=page;
  document.getElementById('topbarTitle').textContent=PAGE_TITLES[page]||page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===page));
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sideOverlay').classList.remove('show');
  renderCurrent();
}
function renderCurrent(){ renderPage(currentPage); }

function renderPage(p){
  const c=document.getElementById('mainContent');
  c.scrollTop=0;
  switch(p){
    case 'dashboard':   c.innerHTML=dashboardHTML(); attachDashboard(); break;
    case 'calendario':  c.innerHTML=calendarHTML();  attachCalendar();  break;
    case 'relogio':     c.innerHTML=clockFullHTML();  startAnalogClock(); break;
    case 'tarefas':     c.innerHTML=tasksHTML();      attachTasks();     break;
    case 'lembretes':   c.innerHTML=remindersHTML();  attachReminders(); break;
    case 'habitos':     c.innerHTML=habitsHTML();     attachHabits();    break;
    case 'notas':       c.innerHTML=notesHTML();      attachNotes();     break;
    case 'caderno':     c.innerHTML=notebookHTML();   attachNotebook();  break;

}

  const wTemp=weatherData?`${Math.round(weatherData.main.temp)}°C`:'—';

/* ============================================================
   CLOCK
============================================================ */
let clockAF=null;
function startAnalogClock(){
  if(clockAF) cancelAnimationFrame(clockAF);
  function tick(){
    const now=new Date();
    const h=now.getHours()%12,m=now.getMinutes(),s=now.getSeconds(),ms=now.getMilliseconds();
    const hDeg=h*30+m*.5;
    const mDeg=m*6+s*.1;
    const sDeg=s*6+ms*.006;
    const hh=document.getElementById('hHour');
    const hm=document.getElementById('hMin');
    const hs=document.getElementById('hSec');
    if(hh){ hh.style.transform=`rotate(${hDeg}deg)`; hm.style.transform=`rotate(${mDeg}deg)`; hs.style.transform=`rotate(${sDeg}deg)`; }
    const dt=document.getElementById('digTime');
    if(dt){ dt.textContent=now.toLocaleTimeString('pt-BR'); }
    const dd=document.getElementById('digDate');
    if(dd){ dd.textContent=`${now.getDate()} de ${MESES[now.getMonth()]} de ${now.getFullYear()}`; }
    const dy=document.getElementById('digDay');
    if(dy){ dy.textContent=DIAS[now.getDay()]; }
    clockAF=requestAnimationFrame(tick);
  }
  tick();
}
function clockFullHTML(){
  return `<div class="card" style="max-width:420px;margin:0 auto;">
    <div class="card-title" data-icon="🕐">Relógio</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:24px;padding:20px 0;">
      <div class="clock-face" style="width:200px;height:200px;">
        ${Array.from({length:60},(_,i)=>`<div class="tick${i%5===0?' major':''}" style="height:${i%5===0?'12px':'7px'};top:${i%5===0?'4px':'7px'};transform:rotate(${i*6}deg) translateX(-50%);position:absolute;left:50%;transform-origin:1px ${i%5===0?'96':'93'}px;"></div>`).join('')}
        <div class="hand hour" id="hHour" style="height:55px;width:5px;margin-left:-2.5px;"></div>
        <div class="hand minute" id="hMin" style="height:78px;width:3px;margin-left:-1.5px;"></div>
        <div class="hand second" id="hSec" style="height:86px;width:2px;margin-left:-1px;"></div>

function recalcStreak(h){
  let streak=0,d=new Date();
  for(let i=0;i<365;i++){
    if(h.days&&h.days[fmtDate(d)]) streak++;
    else if(i>0) break;
    d.setDate(d.getDate()-1);
  }
  h.streak=streak;
}

  const today=fmtDate(new Date());

  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); weekDays.push(d); }

    <div class="habits-grid" id="habitsList">
      ${state.habits.map(h=>`

              const isToday=ds===today;
              return `<div class="habit-day${done?' done':''}${isToday&&!done?' today-marker':''}" data-hid="${h.id}" data-date="${ds}" title="${ds}">
                ${DOW_ABR[d.getDay()]}
              </div>`;

  let cells='';

    cells+=`<div class="cal-day other-month">${prevDays-firstDow+1+i}</div>`;

  for(let d=1;d<=daysInMonth;d++){

  const rem=(7-((firstDow+daysInMonth)%7))%7;
  for(let d=1;d<=rem;d++) cells+=`<div class="cal-day other-month">${d}</div>`;

  const selLabel=`${selectedDay.getDate()} de ${MESES[selectedDay.getMonth()]}`;
  return `<div class="card">
    <div class="card-title" data-icon="📅">Calendário</div>

      <button class="cal-nav" id="calPrev">‹</button>

      ${cells}

}

    const [y,m,d]=el.dataset.date.split('-').map(Number);
    selectedDay=new Date(y,m-1,d);
    renderPage('calendario');
  });
  document.getElementById('calNoteSave').onclick=()=>{
    const ds=fmtDate(selectedDay);
    const val=document.getElementById('calNoteTA').value;
    if(val.trim()) state.calNotes[ds]=val; else delete state.calNotes[ds];
    persist();renderPage('calendario');showToast('Salvo ✓');
  };
  document.getElementById('calNoteDel').onclick=()=>{
    delete state.calNotes[fmtDate(selectedDay)];
    persist();renderPage('calendario');showToast('Excluído');
  };
}

============================================================ */
function contactsHTML(){
  return `<div class="card">
    <div class="card-title" data-icon="👤">Contatos (${state.contacts.length})</div>
    <input type="text" class="contact-search" id="contSearch" placeholder="🔍 Pesquisar contato..."/>
    <div class="contacts-list" id="contactList">
      ${renderContactList('')}
    </div>
    <div style="border-top:1px solid var(--border);margin-top:16px;padding-top:16px;">
      <div style="font-size:.75rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;">Novo contato</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <input type="text" id="cName" placeholder="Nome"/>
        <input type="text" id="cPhone" placeholder="Telefone"/>
        <input type="text" id="cEmail" placeholder="E-mail" style="grid-column:1/-1;"/>
        <input type="text" id="cNote" placeholder="Observação (opcional)" style="grid-column:1/-1;"/>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:10px;">
        <button class="btn btn-gold" id="cAddBtn">+ Adicionar</button>
      </div>
    </div>
  </div>`;
}
function renderContactList(search){
  const filtered=state.contacts.filter(c=>!search||c.name.toLowerCase().includes(search.toLowerCase())||(c.phone||'').includes(search));
  const sorted=[...filtered].sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  return sorted.length?sorted.map(c=>`
    <div class="contact-item">
      <div class="contact-avatar">${c.name.charAt(0).toUpperCase()}</div>
      <div class="contact-info">
        <div class="c-name">${esc(c.name)}</div>
        <div class="c-detail">${[c.phone,c.email].filter(Boolean).map(esc).join(' · ')}</div>
        ${c.note?`<div class="c-detail">${esc(c.note)}</div>`:''}
      </div>
      <button class="contact-del" data-cdel="${c.id}">✕</button>
    </div>
  `).join(''):`<div class="empty"><span class="empty-icon">👤</span>Nenhum contato encontrado.</div>`;
}
function attachContacts(){
  document.getElementById('contSearch').oninput=e=>{ document.getElementById('contactList').innerHTML=renderContactList(e.target.value); attachContactDels(); };
  document.getElementById('cAddBtn').onclick=addContact;
  attachContactDels();
}
function attachContactDels(){
  document.querySelectorAll('.contact-del[data-cdel]').forEach(el=>el.onclick=()=>{
    state.contacts=state.contacts.filter(c=>c.id!==el.dataset.cdel);
    persist();renderPage('contatos');showToast('Contato excluído');
  });
}
function addContact(){
  const name=document.getElementById('cName').value.trim();
  if(!name) return;
  state.contacts.push({id:uid(),name,phone:document.getElementById('cPhone').value.trim(),email:document.getElementById('cEmail').value.trim(),note:document.getElementById('cNote').value.trim(),createdAt:Date.now()});
  persist();renderPage('contatos');showToast('Contato salvo ✓');
}

/* ============================================================
   CLIMA - CORRIGIDO COM MELHOR TRATAMENTO DE ERROS
============================================================ */
const OWM_KEY = '19498d7b4c3d5e9cfadee4ccc7bf50f8'; // Chave pública - pode ser substituída pela sua

function weatherHTML() {
  // Carrega cidade salva no localStorage
  const savedCity = localStorage.getItem('weatherCity') || '';
  if (savedCity && !weatherCity) {
    weatherCity = savedCity;
  }
  return `<div class="card" style="max-width:480px;margin:0 auto;">
    <div class="card-title" data-icon="🌤️">Clima</div>
    ${weatherData ? `
      <div class="weather-big" style="margin-bottom:16px;">
        <div class="w-icon" style="font-size:4rem;">${weatherIcon(weatherData.weather[0].id)}</div>
        <div class="w-temp" style="font-size:3rem;">${Math.round(weatherData.main.temp)}°C</div>
        <div class="w-desc" style="font-size:1rem;">${esc(weatherData.weather[0].description)}</div>
        <div class="w-city" style="font-size:.9rem;margin-top:8px;">📍 ${esc(weatherCity)}</div>
        <div class="w-details" style="margin-top:16px;gap:24px;">
          <span>💧 Umidade: <b>${weatherData.main.humidity}%</b></span>
          <span>💨 Vento: <b>${Math.round(weatherData.wind.speed * 3.6)} km/h</b></span>
          <span>🌡️ Sensação: <b>${Math.round(weatherData.main.feels_like)}°C</b></span>
        </div>
      </div>
    ` : `
      <div class="empty">
        <span class="empty-icon">🌍</span>
        <p>Digite uma cidade para ver o clima</p>
        ${savedCity ? `<p style="font-size:.7rem;color:var(--text3);">Última busca: ${esc(savedCity)}</p>` : ''}
      </div>
    `}
    <div class="w-search">
      <input type="text" id="wCityInput" placeholder="Ex: São Paulo, Rio de Janeiro" value="${esc(weatherCity || '')}" />
      <button class="btn btn-gold" id="wSearchBtn">Buscar</button>
    </div>
    <div id="wError" style="color:var(--red);font-size:.8rem;margin-top:8px;display:none;"></div>
    <div id="wLoading" style="color:var(--text3);font-size:.8rem;margin-top:8px;display:none;">⏳ Carregando...</div>
  </div>`;
}

function attachWeather() {
  const input = document.getElementById('wCityInput');
  const btn = document.getElementById('wSearchBtn');
  const errorDiv = document.getElementById('wError');
  const loadingDiv = document.getElementById('wLoading');

  function buscarClima() {
    const cidade = input.value.trim();
    if (!cidade) {
      errorDiv.textContent = '⚠️ Digite o nome de uma cidade.';
      errorDiv.style.display = 'block';
      return;
    }
    errorDiv.style.display = 'none';
    loadingDiv.style.display = 'block';
    fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(cidade)}&appid=${OWM_KEY}&units=metric&lang=pt_br`)
      .then(res => {
        if (!res.ok) {
          if (res.status === 404) throw new Error('Cidade não encontrada.');
          if (res.status === 401) throw new Error('Chave da API inválida. Configure sua própria chave.');
          throw new Error(`Erro ${res.status}: ${res.statusText}`);
        }
        return res.json();
      })
      .then(data => {
        weatherData = data;
        weatherCity = cidade;
        localStorage.setItem('weatherCity', cidade);
        loadingDiv.style.display = 'none';
        errorDiv.style.display = 'none';
        updateWeatherMini();
        renderPage('clima');
        showToast('Clima atualizado ✓');
      })
      .catch(err => {
        loadingDiv.style.display = 'none';
        errorDiv.textContent = `⚠️ ${err.message}`;
        errorDiv.style.display = 'block';
        console.error('Erro ao buscar clima:', err);
      });
  }

  btn.onclick = buscarClima;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') buscarClima(); });
  input.focus();

  // Se já houver uma cidade salva, busca automaticamente ao carregar a página
  const savedCity = localStorage.getItem('weatherCity');
  if (savedCity && !weatherData) {
    input.value = savedCity;
    buscarClima();
  }
}

function weatherIcon(id) {
  if (id >= 200 && id < 300) return '⛈️';
  if (id >= 300 && id < 400) return '🌦️';
  if (id >= 500 && id < 600) return '🌧️';
  if (id >= 600 && id < 700) return '❄️';
  if (id >= 700 && id < 800) return '🌫️';
  if (id === 800) return '☀️';
  if (id === 801) return '🌤️';
  if (id === 802) return '⛅';
  return '☁️';
}

function updateWeatherMini() {
  if (!weatherData) return;
  const ic = document.getElementById('wmIcon');
  const tmp = document.getElementById('wmTemp');
  const dsc = document.getElementById('wmDesc');
  if (ic) ic.textContent = weatherIcon(weatherData.weather[0].id);
  if (tmp) tmp.textContent = `${Math.round(weatherData.main.temp)}°C`;
  if (dsc) dsc.textContent = weatherData.weather[0].description;
}

function calcHTML(){
  return `<div class="card" style="max-width:320px;margin:0 auto;">
    <div class="card-title" data-icon="🧮">Calculadora</div>
    <div class="calc-wrap">
      <div class="calc-display">
        <span class="calc-expr" id="cExpr"></span>
        <span id="cDisplay">0</span>
      </div>
      <div class="calc-grid">
        <button class="calc-btn clear" data-k="C">C</button>
        <button class="calc-btn op" data-k="(">(</button>
        <button class="calc-btn op" data-k=")">)</button>
        <button class="calc-btn op" data-k="/">÷</button>
        <button class="calc-btn" data-k="7">7</button>
        <button class="calc-btn" data-k="8">8</button>
        <button class="calc-btn" data-k="9">9</button>
        <button class="calc-btn op" data-k="*">×</button>
        <button class="calc-btn" data-k="4">4</button>
        <button class="calc-btn" data-k="5">5</button>
        <button class="calc-btn" data-k="6">6</button>
        <button class="calc-btn op" data-k="-">−</button>
        <button class="calc-btn" data-k="1">1</button>
        <button class="calc-btn" data-k="2">2</button>
        <button class="calc-btn" data-k="3">3</button>
        <button class="calc-btn op" data-k="+">+</button>
        <button class="calc-btn zero" data-k="0">0</button>
        <button class="calc-btn" data-k=".">.</button>
        <button class="calc-btn eq" data-k="=">=</button>
      </div>
    </div>
  </div>`;
}
function attachCalc(){
  let expr='';
  function update(){ document.getElementById('cDisplay').textContent=expr||'0'; }
  document.querySelectorAll('.calc-btn[data-k]').forEach(btn=>{
    btn.onclick=()=>{
      const k=btn.dataset.k;
      if(k==='C'){expr='';}
      else if(k==='='){
        try{
          const safe=expr.replace(/[^0-9+\-*/().,\s]/g,'').replace(/,/g,'.');
          const res=Function('"use strict";return('+safe+')')();
          document.getElementById('cExpr').textContent=expr+' =';
          expr=String(Number.isFinite(res)?Math.round(res*1e10)/1e10:'Erro');
        }catch{expr='Erro';}
      }
      else{if(expr==='Erro')expr='';expr+=k;}
      update();
    };
  });
}
